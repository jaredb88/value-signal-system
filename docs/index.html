/* ---------- noticias por acción (mini-resumen + filtro detalle) ---------- */
function newsCatForTicker(news, ticker){
  if(!news||!news.categorias_meta) return null;
  const T = String(ticker||"").toUpperCase();
  return Object.keys(news.categorias_meta).find(c=>
    (news.categorias_meta[c].label||"").toUpperCase().includes(T)) || null;
}
function catsStats(news, cats){
  // Agrega impactos de las categorías dadas (null = todas)
  if(!news) return null;
  const npc = news.noticias_por_categoria||{};
  const keys = cats ? cats.filter(c=>npc[c]) : Object.keys(npc);
  let neto=0,pos=0,neg=0,n=0; const tops=[];
  keys.forEach(c=>(npc[c]||[]).forEach(it=>{
    n++; const im=it.impacto||{}; const i=im.intensidad||0;
    if(im.direccion==="positivo"){neto+=i;pos++; if(i>0)tops.push({i,d:1,r:im.razonamiento||it.title});}
    else if(im.direccion==="negativo"){neto-=i;neg++; if(i>0)tops.push({i,d:-1,r:im.razonamiento||it.title});}
  }));
  tops.sort((a,b)=>b.i-a.i);
  const sent = neto>=2?["alcista","var(--pos)"]:neto<=-2?["bajista","var(--neg)"]
             : neto>0?["lev. alcista","var(--pos)"]:neto<0?["lev. bajista","var(--neg)"]
             : ["neutral","var(--tx-3)"];
  return {n,pos,neg,neto,sent,tops};
}
function newsMiniLine(news, cats){
  const s = catsStats(news, cats);
  if(!s || !s.n) return "";
  const top = s.tops[0];
  return `<div class="row-news">📰 <span class="sent" style="color:${s.sent[1]}">${esc(s.sent[0])}</span>
    <span class="dim">· ${s.pos}🟢 ${s.neg}🔴 de ${s.n}</span>
    ${top?`<span class="top-r">— ${top.d>0?"↑":"↓"} ${esc(top.r)}</span>`:""}</div>`;
}
function newsMiniBlock(news, cats, label){
  const s = catsStats(news, cats);
  if(!s || !s.n) return "";
  const drivers = s.tops.slice(0,2).map(t=>
    `<div class="cn-row"><span style="color:${t.d>0?'var(--pos)':'var(--neg)'};font-family:var(--f-mono)">${t.d>0?"↑":"↓"}</span> ${esc(t.r)}</div>`).join("");
  return `<div class="card-news">
    <div class="cn-hd">📰 Noticias${label?` relevantes · ${esc(label)}`:""} (72h):
      <span class="sent" style="color:${s.sent[1]}">${esc(s.sent[0])}</span>
      <span class="dim">${s.pos}🟢 ${s.neg}🔴 de ${s.n}</span></div>
    ${drivers||`<div class="cn-row dim">Sin drivers direccionales en el período.</div>`}
  </div>`;
}
function newsFilteredObj(news, cats){
  if(!news||!cats) return news;
  const meta={}, npc={};
  cats.forEach(c=>{ if(news.categorias_meta?.[c]){ meta[c]=news.categorias_meta[c]; npc[c]=(news.noticias_por_categoria||{})[c]||[]; }});
  return {...news, categorias_meta:meta, noticias_por_categoria:npc};
}
function stockNewsMini(news, ticker){
  const cat = newsCatForTicker(news, ticker);
  return cat ? newsMiniLine(news, [cat]) : "";
}

/* mapeo activo → categorías de noticias relevantes */
const ETF_NEWS_CATS = {
  CFISPETF:  ["mercado","fed_tasas","economia","earnings","sentimiento"],
  CFINASDAQ: ["tech_nasdaq","fed_tasas","economia","sentimiento"],
  SCHD:      ["mercado","fed_tasas","economia","earnings"],
  JEPQ:      ["tech_nasdaq","fed_tasas","sentimiento"],
};
function clCats(sector){
  const s = (sector||"").toLowerCase();
  if(s.includes("afp")) return ["pensiones_afp","bcch_tpm","ipsa","economia_chile","politica_regulacion"];
  if(s.includes("eléctr")||s.includes("electr")||s.includes("energ")||s.includes("gas"))
    return ["energia_tarifas","bcch_tpm","economia_chile","dolar_cobre","politica_regulacion"];
  if(s.includes("fertil")) return ["dolar_cobre","sectores_watchlist","economia_chile","ipsa"];
  return ["sectores_watchlist","ipsa","economia_chile","bcch_tpm","politica_regulacion"];
}
function usaNewsFiltered(news, ticker, todosTickers){
  // noticias de ESTA acción + categorías compartidas (excluye las de otras acciones)
  if(!news||!news.categorias_meta) return null;
  const otros = (todosTickers||[]).filter(t=>t!==ticker).map(t=>t.toUpperCase());
  const keep = Object.keys(news.categorias_meta).filter(c=>{
    const lab=(news.categorias_meta[c].label||"").toUpperCase();
    return !otros.some(t=>lab.includes(t));
  });
  const propia = newsCatForTicker(news, ticker);
  keep.sort((a,b)=>(a===propia?-1:0)-(b===propia?-1:0));
  const meta={}, npc={};
  keep.forEach(c=>{ meta[c]=news.categorias_meta[c]; npc[c]=(news.noticias_por_categoria||{})[c]||[]; });
  return {...news, categorias_meta:meta, noticias_por_categoria:npc};
}

function perBar(per, min, max, status){

  const color = US_VAL_COLOR[status]||"var(--z-neu)";

    <div class="range" style="left:${x(min)}%;width:${x(max)-x(min)}%"></div>

}

  const sent = news.resumen_ejecutivo?.sentimiento;

  const nBaratas = acc.filter(a=>a.valoracion?.status==="Barata").length;
  let ic,cls,tag,desc;
  if(nBaratas>0 && sg<0){ ic="✅";cls="good";tag="Señal contrarian";
    desc=`${nBaratas} acción(es) a precio razonable/barato con noticias bajistas: comprar con miedo es exactamente el plan.`; }
  else if(nCaras===acc.length && sg>0){ ic="⚠️";cls="warn";tag="Euforia";
    desc="Todo el watchlist está caro y las noticias son alcistas: no perseguir el precio. El mercado paga expectativas, no fundamentos."; }
  else if(nCaras===acc.length && sg<0){ ic="⏳";cls="muted";tag="Posible corrección";
    desc="Watchlist caro pero con flujo de noticias bajista: si el castigo continúa, los múltiplos pueden entrar en rango. Monitorear, no comprar aún."; }
  else if(nCaras===acc.length){ ic="⏳";cls="muted";tag="Esperando precio";
    desc="Empresas en watchlist a la espera de mejores múltiplos. En los momentos de pánico están las mejores opciones."; }
  else { ic="•";cls="muted";tag="Mixto";
    desc="Valoraciones mixtas en el watchlist: revisar caso a caso contra el flujo de noticias."; }
  return `<div class="align ${cls==='warn'?'warn':''}" style="margin-top:14px">

/* ---------- evaluación fundamental USA (múltiplos, no dividendo) ---------- */
function evalValorUSA(a){
  const rows=[]; const v=a.valoracion||{}; const f=a.fund||{};
  if(a.per!=null && v.per_rango_max!=null){
    const cls = a.per < v.per_rango_min ? "ok" : a.per <= v.per_rango_max ? "mid" : "bad";
    rows.push([cls,`PER ${fmt.num(a.per,1)} vs rango ${fmt.num(v.per_rango_min,0)}–${fmt.num(v.per_rango_max,0)}`,
      cls==="ok"?"bajo el rango razonable de su clasificación: posible descuento (verificar que la utilidad sea estable y operacional).":
      cls==="mid"?"dentro del rango razonable para una empresa de "+esc((a.clasificacion||"").toLowerCase())+".":
      "sobre el rango razonable: el mercado paga muchos años de utilidad por adelantado."]);
  }
  if(a.pb!=null && v.pb_rango_max!=null){
    const cls = a.pb <= v.pb_rango_max ? "ok" : a.pb <= v.pb_rango_max*1.5 ? "mid" : "bad";
    rows.push([cls,`P/B ${fmt.num(a.pb,1)} vs razonable ${fmt.num(v.pb_rango_min,1)}–${fmt.num(v.pb_rango_max,1)}`,
      cls==="ok"?`coherente con su ROE (${fmt.pct(f.roe_pct)}).`:
      cls==="mid"?"algo sobre lo que su ROE justifica.":
      `muy por sobre lo que el ROE (${fmt.pct(f.roe_pct)}) justifica según la tabla ROE↔P/B.`]);
  }
  if(v.graham!=null){
    const cls = v.graham < 22.5 ? "ok" : v.graham < 45 ? "mid" : "bad";
    rows.push([cls,`Graham ${fmt.num(v.graham,1)} vs 22.5`,
      cls==="ok"?"bajo el umbral de Graham: precio razonable según el desempate clásico.":
      cls==="mid"?"sobre el umbral de Graham: cara en términos value clásicos.":
      "muy sobre el umbral: el precio descuenta crecimiento extraordinario por años."]);
  }
  if(a.g_pct!=null){
    rows.push(["mid",`G = ${fmt.pct(a.g_pct)}`,
      `crecimiento implícito (ROE × retención). ${a.payout_pct<5?"Sin dividendo relevante: toda la tesis es apreciación de capital.":"Parte de la utilidad se reparte."}`]);
  }
  const s=evScore(rows);
  const concl = v.status==="Barata" ? ["ok","<b>Precio con descuento</b> según múltiplos cruzados: revisar utilidad estable y operacional antes de comprar (evitar la trampa del PER bajo)."] :
                v.status==="Razonable" ? ["","<b>Precio razonable</b> para su clasificación: comprable si la convicción cualitativa acompaña."] :
                ["bad","<b>Acción cara hoy</b> según múltiplos: una empresa excelente no es buena inversión a cualquier precio. Mantener en watchlist — en los momentos de pánico están las mejores opciones."];
  return {rows,concl};
}

function evalUSAPanel(a){
  try{
    const sal=evalSaludChile(a), val=evalValorUSA(a);
    if(!sal.rows.length && !val.rows.length) return "";
    return `<div class="panel" style="margin-bottom:16px">
      <h3>🔬 Evaluación fundamental</h3>
      <div class="ev-grid">
        <div class="ev-col"><h4>Salud financiera</h4>${sal.rows.map(r=>evRow(...r)).join("")}${evConcl(sal.concl[0],sal.concl[1])}</div>
        <div class="ev-col"><h4>Valoración por múltiplos</h4>${val.rows.map(r=>evRow(...r)).join("")}${evConcl(val.concl[0],val.concl[1])}</div>
      </div>
      <div class="ev-note">${sal.note} Valoración por múltiplos cruzados — sin flujo de caja descontado (muy sensible a supuestos para el inversionista minoritario).</div>
    </div>`;
  }catch(e){ console.warn("evalUSAPanel",e); return ""; }
}

/* =================== ACCIONES CHILENAS =================== */
function renderChile(param){
  if(param) return renderChileDetail(param);
  const ch = VS.data.chile;
  const news = VS.data.n_chile;
  if(VS.status.chile==="error" && !ch) return viewHead("🇨🇱","Acciones Chilenas","")+errBox("chile",VS.FILES.chile);
  if(!ch||!ch.acciones) return viewHead("🇨🇱","Acciones Chilenas","")+skeletonCards(3);

  const acc = ch.acciones.slice();
  const order = {"Sobre benchmark":0,"En rango":1,"Dentro benchmark":1,"Bajo benchmark":2};
  acc.sort((a,b)=>{
    const oa=order[a.evaluacion?.status]??3, ob=order[b.evaluacion?.status]??3;
    if(oa!==ob) return oa-ob;
    return (clPP(b)??-99)-(clPP(a)??-99);
  });
  const nSobre = acc.filter(a=>a.evaluacion?.status==="Sobre benchmark").length;

  const sidebar = `<div><div class="sidebar-news">
    <div class="hd">📰 Noticias · Chile${eduIconStatic('news')} ${news?`<span class="hint" style="margin-left:auto">${fmt.ago(VS.updated.n_chile)}</span>`:""}</div>
    ${VS.status.n_chile==="error"?errBox("n_chile","noticias"):""}
    ${news?execSummary(news):""}
    ${news?chileAlign(nSobre, acc.length, news):""}
    <div class="hint" style="margin-top:14px;line-height:1.5">Toca <b>Ver detalle</b> en una acción para desplegar las noticias relevantes a su sector con interpretación de impacto.</div>
  </div></div>`;

  const main = `
    <div class="section-title" style="margin-top:0">Watchlist dividenderas<span class="count">${acc.length}</span>
      <span class="hint" style="text-transform:none;letter-spacing:0;font-weight:400">${nSobre} sobre benchmark · ordenadas por exceso sectorial</span>
      <span class="rule"></span></div>
    <div class="grid rows2">${acc.map(clRow).join("")}</div>`;

  return viewHead("🇨🇱","Acciones Chilenas", srcStamp("chile"),
    "Dividend Yield (promedio 3 años, definitivos+provisorios) vs rango sectorial") +
    `<div class="layout-split"><div>${main}</div>${sidebar}</div>`;
}

function chileAlign(nSobre, total, news){
  const sent = news.resumen_ejecutivo?.sentimiento;
  const sg = sentSign(sent);
  let ic,cls,tag,desc;
  if(nSobre>=3 && sg<0){ ic="✅";cls="good";tag="Contrarian en bloque";
    desc=`${nSobre} de ${total} acciones sobre benchmark con noticias bajistas: castigo de precio que sube el DY. Buen momento para reforzar las mejores.`; }
  else if(nSobre>=3 && sg>=0){ ic="✅";cls="good";tag="Varias oportunidades";
    desc=`${nSobre} acciones sobre su benchmark sectorial. El DY elevado es estructural, no solo por caída de precio.`; }
  else if(nSobre===0){ ic="⏳";cls="muted";tag="Sin oportunidades";
    desc="Ninguna acción supera hoy el máximo de su rango sectorial. Mantener aportes base."; }
  else { ic="•";cls="muted";tag=`${nSobre} sobre benchmark`;
    desc="Algunas acciones puntuales superan su rango sectorial. Revisar caso a caso."; }
  return `<div class="align ${cls==='warn'?'warn':''}" style="margin-top:14px">
    <div class="hd"><span class="ic">${ic}</span> ${tag}</div>
    <div class="mx">
      <div class="b"><div class="l">Sobre benchmark</div><div class="v" style="color:var(--z-opp)">${nSobre} / ${total}</div></div>
      <div class="b"><div class="l">Noticias Chile</div><div class="v">${esc(sent||"—")}</div></div>
    </div>
    <div class="desc">${esc(desc)}</div>
  </div>`;
}

/* ============================================================
   VALUE SIGNAL — router + app shell
   ============================================================ */
const ROUTES = {
  home:    {label:"Oportunidades", ico:"🎯", render:renderHome},
  etfs:    {label:"ETFs USA",      ico:"📊", render:renderETFs},
  chile:   {label:"Chile",         ico:"🏛️", render:p=>renderChile(p)},
  usa:     {label:"Acciones USA",  ico:"📈", render:p=>renderUSA(p)},
  oro:     {label:"Oro",           ico:"🥇", render:()=>renderAsset("oro")},
  bitcoin: {label:"Bitcoin",       ico:"₿",  render:()=>renderAsset("bitcoin")},
};

function parseHash(){
  const h = (location.hash||"#home").replace(/^#/,"");
  const [route, param] = h.split("/");
  return {route: ROUTES[route]?route:"home", param: param?decodeURIComponent(param):null};
}
function go(route, param){
  location.hash = param ? `${route}/${encodeURIComponent(param)}` : route;
}
window.retrySource = async function(key){
  await fetchSource(key);
  scheduleRender();
};

let _pendingRender = null;
function scheduleRender(){
  if(_pendingRender) return;
  // setTimeout (not rAF): must also fire in background/hidden tabs
  _pendingRender = setTimeout(()=>{ _pendingRender=null; render(); }, 60);
}

function render(){
  VS.eduReg = [];
  const {route, param} = parseHash();
  // nav active
  document.querySelectorAll("nav.tabs a").forEach(a=>a.classList.toggle("active", a.dataset.route===route));
  // content
  const view = document.getElementById("view");
  try{
    view.innerHTML = ROUTES[route].render(param);
  }catch(e){
    view.innerHTML = `<div class="err-box">⚠️ Error al renderizar la vista: ${esc(e.message)}</div>`;
    console.error(e);
  }
  flushCharts();
  updateHeader();
  window.scrollTo({top:0});
}

function updateHeader(){
  const keys = Object.keys(VS.FILES);
  const anyLoading = keys.some(k=>VS.status[k]==="loading");
  const okTimes = keys.map(k=>VS.updated[k]).filter(Boolean).map(t=>new Date(t).getTime());
  const newest = okTimes.length?new Date(Math.max(...okTimes)):null;
  const nErr = keys.filter(k=>VS.status[k]==="error").length;

  const btn = document.getElementById("rfBtn");
  if(btn) btn.classList.toggle("loading", anyLoading);
  let msg;
  if(anyLoading) msg = `<b>actualizando…</b>`;
  else if(newest) msg = `datos <b>${fmt.ago(newest.toISOString())}</b>${nErr?` · <span style="color:var(--red)">${nErr} con error</span>`:""}`;
  else msg = `<b>—</b>`;
  const t = document.getElementById("rfTime");   if(t)  t.innerHTML = msg;
  const t2 = document.getElementById("rfTime2"); if(t2) t2.innerHTML = msg;
}

async function refresh(){
  await fetchAll();
  scheduleRender();
}

/* status callback during fetches → keep header + view live */
function onStatusChange(key){
  updateHeader();
  // re-render current view as its data lands (cheap, coalesced)
  scheduleRender();
}

function buildNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = Object.entries(ROUTES).map(([r,c])=>
    `<a href="#${r}" data-route="${r}"><span class="ico">${c.ico}</span>${esc(c.label)}</a>`).join("");
}

function init(){
  buildNav();
  window.addEventListener("hashchange", render);
  document.getElementById("rfBtn").addEventListener("click", refresh);
  document.getElementById("brand").addEventListener("click", ()=>go("home"));
  render();            // initial (skeletons)
  fetchAll().then(scheduleRender);
  // auto refresh
  setInterval(refresh, VS.AUTO_MIN*60*1000);
  // refresh "ago" labels every 30s
  setInterval(updateHeader, 30000);
}

document.addEventListener("DOMContentLoaded", ()=>{
  const e=document.getElementById("vsBuild"); if(e) e.textContent = VS_BUILD;
  console.log("Value Signal", VS_BUILD);
});
document.addEventListener("DOMContentLoaded", init);
